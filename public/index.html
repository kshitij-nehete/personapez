<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PersonaPez</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <div class="corner corner-tl"></div>
      <div class="corner corner-tr"></div>
      <div class="corner corner-bl"></div>
      <div class="corner corner-br"></div>

      <header>
        <div class="title-row">
          <div class="status-dot"></div>
          <h1>PersonaPez</h1>
        </div>
        <div class="log-line">
          // persona loaded:
          <span class="hl" id="loadedLabel">hitesh_persona.json</span>
        </div>

        <div class="tabs">
          <button class="tab active" data-persona="hitesh">
            <div class="tab-name-row">
              <span class="dot"></span>
              Hitesh Choudhary
            </div>
            <div class="role">Chai aur Code</div>
          </button>
          <button class="tab" data-persona="piyush">
            <div class="tab-name-row">
              <span class="dot"></span>
              Piyush Garg
            </div>
            <div class="role">Chai aur Code</div>
          </button>
        </div>
      </header>

      <div class="starters" id="starters"></div>

      <div class="log" id="log">
        <div class="empty" id="emptyState">
          // tap a suggested question below<br />
          // or type your own
        </div>
      </div>

      <div class="disclaimer">
        AI persona simulation for demo purposes — not the real individuals.
      </div>

      <form class="composer" id="composer">
        <textarea
          id="input"
          rows="1"
          placeholder="Message Hitesh..."
          autofocus
        ></textarea>
        <button class="send-btn" id="sendBtn" type="submit">Send</button>
      </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
